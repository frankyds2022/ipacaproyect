name: Deploy to Hostinger FTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 🛠️ Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'

    - name: 📦 Install Composer Dependencies
      run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

    - name: 🛠️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 📦 Install NPM & Build React
      run: |
        npm install
        npm run build

    - name: 🙈 Force git tracking for build artifacts locally
      run: |
        git config --global user.email "bot@ipaca.com"
        git config --global user.name "Robot FTP"
        git add -f public/build
        git commit -m "Force track build folder"

    - name: 📂 Sync public files to public_html
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./public/
        server-dir: ./domains/ipacaconsultores.com/public_html/

    - name: 📂 Sync core files to ipaca_web
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./
        server-dir: ./domains/ipacaconsultores.com/ipaca_web/
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/public/**
          tests/**
          .env
          README.md
